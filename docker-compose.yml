services:
  sunbird-proxy:
    image: oasis256/sunbird-proxy:latest
    container_name: Sunbird
    hostname: sunbird
    build:
      context: https://github.com/Oasis256/sunbird-page-translator.git#main:proxy
    ports:
      - "8787:8787"
    env_file:
      - ./proxy/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
