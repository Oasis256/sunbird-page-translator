<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Sunbird Translator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 12px;
      width: 300px;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 8px;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      background: #0f62fe;
      color: #fff;
    }
    button.secondary {
      background: #6b7280;
    }
    #status {
      font-size: 12px;
      color: #222;
      min-height: 16px;
    }
    .hint {
      font-size: 11px;
      color: #666;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>Translate to Runyankore</h1>
  <div class="row">
    <button id="translateBtn">Translate Page</button>
    <button id="restoreBtn" class="secondary">Restore</button>
    <button id="copyBtn" class="secondary">Copy Wikitext</button>
  </div>
  <div id="status"></div>
  <div class="hint">Works on Wikipedia articles. Uses local proxy at <code>http://localhost:8787</code>.</div>
  <script src="popup.js"></script>
</body>
</html>
